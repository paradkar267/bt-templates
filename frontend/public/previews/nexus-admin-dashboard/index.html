<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="h-16 flex items-center px-6 text-2xl font-bold border-b border-gray-800">
            Nexus Admin
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="flex items-center gap-3 bg-indigo-600 text-white px-4 py-3 rounded-lg"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" class="flex items-center gap-3 text-gray-400 hover:text-white px-4 py-3 rounded-lg transition-colors"><i class="fas fa-users"></i> Users</a>
            <a href="#" class="flex items-center gap-3 text-gray-400 hover:text-white px-4 py-3 rounded-lg transition-colors"><i class="fas fa-chart-line"></i> Analytics</a>
            <a href="#" class="flex items-center gap-3 text-gray-400 hover:text-white px-4 py-3 rounded-lg transition-colors"><i class="fas fa-cog"></i> Settings</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h1 class="text-xl font-semibold text-gray-800">Dashboard Overview</h1>
            <div class="flex items-center gap-4">
                <i class="fas fa-bell text-gray-400 text-xl cursor-pointer hover:text-gray-600"></i>
                <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold cursor-pointer">AD</div>
            </div>
        </header>

        <div class="p-8">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">Total Revenue</p>
                        <p class="text-3xl font-bold text-gray-900">$24,500</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xl"><i class="fas fa-dollar-sign"></i></div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">New Users</p>
                        <p class="text-3xl font-bold text-gray-900">1,240</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl"><i class="fas fa-user-plus"></i></div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">Active Sessions</p>
                        <p class="text-3xl font-bold text-gray-900">3,892</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-xl"><i class="fas fa-bolt"></i></div>
                </div>
            </div>

            <!-- Recent Activity Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">Recent Users</h2>
                    <button class="text-indigo-600 text-sm font-medium hover:underline">View All</button>
                </div>
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 text-sm">
                        <tr>
                            <th class="px-6 py-3 font-medium">Name</th>
                            <th class="px-6 py-3 font-medium">Role</th>
                            <th class="px-6 py-3 font-medium">Status</th>
                            <th class="px-6 py-3 font-medium">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm">
                        <tr>
                            <td class="px-6 py-4 font-medium text-gray-900">John Doe</td>
                            <td class="px-6 py-4 text-gray-500">Admin</td>
                            <td class="px-6 py-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-semibold">Active</span></td>
                            <td class="px-6 py-4"><button class="text-indigo-600 hover:text-indigo-900">Edit</button></td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 font-medium text-gray-900">Jane Smith</td>
                            <td class="px-6 py-4 text-gray-500">Editor</td>
                            <td class="px-6 py-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-semibold">Active</span></td>
                            <td class="px-6 py-4"><button class="text-indigo-600 hover:text-indigo-900">Edit</button></td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 font-medium text-gray-900">Bob Johnson</td>
                            <td class="px-6 py-4 text-gray-500">User</td>
                            <td class="px-6 py-4"><span class="bg-gray-100 text-gray-700 px-2 py-1 rounded-full text-xs font-semibold">Offline</span></td>
                            <td class="px-6 py-4"><button class="text-indigo-600 hover:text-indigo-900">Edit</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
